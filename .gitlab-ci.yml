image:
  name: "node:22.15.0-alpine3.21"

default:
  tags:
    - infra-common

stages:
  - test
  - search

# Переменные окружения
variables:
  SEARCH_KEYWORD:
    description: "Введите ключевое слово для поиска"
    value: "include"
  SEARCH_FILE_PATTERN:
    description: "Шаблон для поиска файлов (например, *.yml)"
    value: "*.yml"
  GITLAB_GROUP_ID:
    description: "Введите ID группы например для xxx 160"
    value: "160"
  GITLAB_HOST: "https://gitlab.xxx.com"
  GITLAB_TOKEN: "${CI_TOKEN}"

# Поиск по ключевому слову
search_keyword:
  stage: search
  when: manual
  script:
    - npm install
    - node search.js -s "${SEARCH_KEYWORD}" -p "${SEARCH_FILE_PATTERN}" -g "${GITLAB_GROUP_ID}" --host "${GITLAB_HOST}" --token "${GITLAB_TOKEN}"